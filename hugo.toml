baseURL = 'https://goodniceqingwa.github.io/blog/'
languageCode = 'zh-cn'
title = "Qingwa's Blog"
theme = 'PaperMod'
defaultContentLanguage = 'zh'
hasCJKLanguage = true
paginate = 10

[params]
  env = 'production'
  description = "Qingwa 的个人博客 - 技术与生活"
  author = 'Qingwa'
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  comments = false

  [params.homeInfoParams]
    Title = "你好 👋"
    Content = "欢迎来到 Qingwa 的博客，这里记录技术探索与生活点滴。"

  [[params.socialIcons]]
    name = 'github'
    url = 'https://github.com/goodniceqingwa'

[params.assets]
  disableHLJS = true

[markup]
  [markup.highlight]
    style = 'monokai'
    lineNos = true
    codeFences = true
    guessSyntax = true

  [markup.goldmark.renderer]
    unsafe = true

[outputs]
  home = ['HTML', 'RSS', 'JSON']

[taxonomies]
  category = 'categories'
  tag = 'tags'

[[menu.main]]
  identifier = 'categories'
  name = '分类'
  url = '/categories/'
  weight = 10

[[menu.main]]
  identifier = 'tags'
  name = '标签'
  url = '/tags/'
  weight = 20

[[menu.main]]
  identifier = 'archives'
  name = '归档'
  url = '/archives/'
  weight = 30

[[menu.main]]
  identifier = 'search'
  name = '搜索'
  url = '/search/'
  weight = 40

[[menu.main]]
  identifier = 'about'
  name = '关于'
  url = '/about/'
  weight = 50
